<!DOCTYPE html>
<html lang="en" data-lang="rust">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lang · Tutor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
<div id="app">

  <!-- ─── Header ───────────────────────────────────────────── -->
  <header id="manualHeader">
    <div class="header-mark">
      <span class="mark-glyph">§</span>
      <span class="mark-text">Lang<span class="mark-dot">·</span>Tutor</span>
      <span class="mark-edition">a personal manual · ed. mmxxvi</span>
    </div>

    <nav id="languageRail" class="language-rail" aria-label="Language">
      <button type="button" class="lang-tab" data-lang="rust">
        <span class="lang-num">i.</span>
        <span class="lang-name">Rust</span>
        <span class="lang-meta" data-lang-meta="rust">— · —</span>
      </button>
      <button type="button" class="lang-tab" data-lang="cpp">
        <span class="lang-num">ii.</span>
        <span class="lang-name">C<span class="cpp-plus">++</span></span>
        <span class="lang-meta" data-lang-meta="cpp">— · —</span>
      </button>
      <button type="button" class="lang-tab" data-lang="python">
        <span class="lang-num">iii.</span>
        <span class="lang-name">Python</span>
        <span class="lang-meta" data-lang-meta="python">— · —</span>
      </button>
      <button type="button" class="lang-tab" data-lang="csharp">
        <span class="lang-num">iv.</span>
        <span class="lang-name">C#</span>
        <span class="lang-meta" data-lang-meta="csharp">— · —</span>
      </button>
      <button type="button" class="lang-tab" data-lang="web">
        <span class="lang-num">v.</span>
        <span class="lang-name">Web</span>
        <span class="lang-meta" data-lang-meta="web">— · —</span>
      </button>
    </nav>

    <div class="header-tools">
      <button type="button" id="themeToggle" class="ghost-btn icon-btn" aria-label="Toggle theme" title="Toggle light / dark">
        <i class="ti ti-contrast-2-filled" aria-hidden="true"></i>
      </button>
      <button type="button" id="resetBtn" class="ghost-btn" title="Reset progress for the current language" style="display:none">Reset</button>
    </div>
  </header>

  <!-- ─── Chapter strip ───────────────────────────────────── -->
  <div id="chapterStrip" class="chapter-strip">
    <span class="folio" id="folio">Pg.&nbsp;—</span>
    <h1 class="chapter-name" id="chapterName">A blank page</h1>
    <span class="chapter-meta" id="chapterMeta"></span>
  </div>

  <!-- ─── Body ───────────────────────────────────────────── -->
  <div id="bodySplit">

    <aside class="aside">
      <div class="aside-tabs">
        <button type="button" class="aside-tab is-active" id="tabChatBtn" data-tab="chat">
          <span class="aside-tab-num">i.</span>
          <span class="aside-tab-name">The Tutor</span>
        </button>
        <button type="button" class="aside-tab" id="tabProgBtn" data-tab="progress">
          <span class="aside-tab-num">ii.</span>
          <span class="aside-tab-name">Lesson Plan</span>
          <span id="progCount" class="aside-tab-meta" style="display:none"></span>
        </button>
      </div>

      <div id="chatView" class="chat-view">
        <div id="msgList" class="msg-list"></div>
        <div id="chatAttachment" class="chat-attachment" style="display:none"></div>
        <div id="inputRow" class="input-row" style="display:none">
          <textarea id="chatInput" class="chat-input" placeholder="Ask the tutor… &nbsp;(↵ to send · ⇧↵ for newline)"></textarea>
          <button type="button" id="sendBtn" class="send-btn" aria-label="Send">
            <i class="ti ti-arrow-up" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <div id="progressView" class="prog-view" style="display:none">
        <div id="progressScroll" class="prog-scroll"></div>
      </div>
    </aside>

    <div id="asideResize" class="aside-resize" role="separator" aria-orientation="vertical" aria-label="Resize chat panel" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100"></div>

    <main class="main">
      <div class="main-toolbar">
        <span id="fileLabel" class="file-label">main.rs</span>
        <span class="file-spec" id="fileSpec">edition 2021 · debug</span>
        <span id="progBadge" class="badge" style="display:none"></span>
        <div class="toolbar-spacer"></div>
        <button type="button" id="evalBtn" class="ghost-btn" title="Send your code + last run output to the tutor for review" disabled>
          <span>Send to tutor</span>
          <i class="ti ti-arrow-narrow-right" aria-hidden="true"></i>
        </button>
        <button type="button" id="runBtn" class="primary-btn">
          <i class="ti ti-player-play-filled" aria-hidden="true"></i>
          <span id="runLabel">Run</span>
        </button>
      </div>
      <div id="codeArea" class="code-area"></div>
      <div id="resizeBar" class="resize-bar"></div>
      <div class="output-eyebrow">
        <span class="output-eyebrow-fig">fig. ii</span>
        <span class="output-eyebrow-name">output</span>
        <span class="toolbar-spacer"></span>
        <span class="output-eyebrow-spec">stdout / stderr</span>
      </div>
      <pre id="outputPre" class="output-pre" style="flex: 0 0 120px"><span class="muted">Run the program to capture its output here.</span></pre>

      <!-- ─── Project workspace (web course) ───────────────────── -->
      <!--
        File tree lives on the RIGHT side of the workspace so the chat (left)
        sits closest to the editor (centre). DOM order: editor-pane → resize
        → tree.
      -->
      <div class="project-workspace" id="projectWorkspace" style="display:none">
        <section class="proj-editor-pane">
          <div class="proj-toolbar">
            <span class="file-label">project</span>
            <span class="file-spec">workspace</span>
            <div class="toolbar-spacer"></div>
            <button type="button" id="projConsoleRunBtn" class="ghost-btn icon-btn" title="Run the active C# file as a console snippet" disabled>
              <i class="ti ti-terminal-2" aria-hidden="true"></i>
            </button>
            <button type="button" id="projEvalBtn" class="ghost-btn" title="Send open files + rendered page + console + server logs to the tutor">
              <span>Send to tutor</span>
              <i class="ti ti-arrow-narrow-right" aria-hidden="true"></i>
            </button>
            <button type="button" id="projRunBtn" class="primary-btn">
              <i class="ti ti-player-play-filled" aria-hidden="true"></i>
              <span id="projRunLabel">Run</span>
            </button>
          </div>
          <div class="proj-tabs" id="projTabs" role="tablist"></div>
          <div class="proj-editor" id="projEditor"></div>
          <div class="proj-status" id="projStatus"></div>
          <div id="projPreviewResize" class="proj-preview-resize" role="separator" aria-orientation="horizontal" aria-label="Resize preview pane" aria-valuenow="30" aria-valuemin="0" aria-valuemax="100"></div>
          <div class="proj-preview" id="projPreview" style="flex: 0 0 280px">
            <div class="proj-preview-header">
              <div class="proj-preview-tabs" id="projPreviewTabs" role="tablist"></div>
              <span class="proj-preview-status" id="projPreviewStatus">stopped</span>
              <button type="button" id="projReloadBtn" class="proj-preview-icon-btn" title="Reload preview" disabled>
                <i class="ti ti-refresh" aria-hidden="true"></i>
              </button>
              <button type="button" id="projOpenExternalBtn" class="proj-preview-icon-btn" title="Open preview in new tab" disabled>
                <i class="ti ti-external-link" aria-hidden="true"></i>
              </button>
              <button type="button" id="projScreenshotBtn" class="proj-preview-icon-btn" title="Capture a screenshot and attach it to your next chat message" disabled>
                <i class="ti ti-camera" aria-hidden="true"></i>
              </button>
            </div>
            <div class="proj-preview-body" id="projPreviewBody"></div>
          </div>
        </section>
        <div id="projTreeResize" class="proj-tree-resize" role="separator" aria-orientation="vertical" aria-label="Resize file tree" aria-valuenow="20" aria-valuemin="0" aria-valuemax="100"></div>
        <aside class="proj-tree" id="projTree" aria-label="Project files"></aside>
      </div>
    </main>

  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
