<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lang tutor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="font-sans">
<div id="app" class="flex flex-col h-screen max-w-[1000px] mx-auto bdr-x">

  <!-- Topbar -->
  <div class="flex items-center justify-between px-[14px] py-[9px] bdr-b shrink-0">
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-[7px]">
        <i class="ti ti-code text-[17px]" aria-hidden="true"></i>
        <span class="font-medium text-sm">Lang tutor</span>
      </div>
      <select id="langSelect" class="input-base text-[12px] py-[3px] pl-[8px] pr-[24px] cursor-pointer" aria-label="Select language">
        <option value="rust">Rust</option>
        <option value="cpp">C++</option>
        <option value="python">Python</option>
      </select>
    </div>
    <div class="flex items-center gap-2">
      <span id="progBadge" class="text-[10px] text-muted px-[7px] py-[2px] bdr rounded-lg" style="display:none"></span>
      <button type="button" id="resetBtn" class="btn text-[11px] px-[9px] py-[3px]" title="Reset progress for the current language" style="display:none">Reset</button>
    </div>
  </div>

  <!-- Split -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Left col: chat + progress -->
    <div class="w-[43%] flex flex-col bdr-r min-w-0">

      <!-- Tabs -->
      <div class="flex bdr-b shrink-0">
        <button type="button" class="subtab active" id="tabChatBtn">Chat</button>
        <button type="button" class="subtab" id="tabProgBtn">Progress<span id="progCount" style="display:none"></span></button>
      </div>

      <!-- Chat view -->
      <div id="chatView" class="flex flex-col flex-1 overflow-hidden">
        <div id="msgList" class="flex-1 overflow-y-auto p-3"></div>
        <div id="inputRow" class="gap-[7px] px-[10px] py-2 bdr-t shrink-0" style="display:none">
          <textarea id="chatInput"
            class="input-base flex-1 h-[54px] text-[13px] px-[9px] py-[6px]"
            placeholder="Ask a question… (Enter to send, Shift+Enter for newline)"></textarea>
          <button type="button" id="sendBtn" class="btn self-end px-[11px] py-[7px]" aria-label="Send">
            <i class="ti ti-send" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <!-- Progress view -->
      <div id="progressView" class="flex-col flex-1 overflow-hidden" style="display:none">
        <div id="progressScroll" class="flex-1 overflow-y-auto p-3"></div>
      </div>

    </div>

    <!-- Right col: editor + output -->
    <div class="flex-1 flex flex-col min-w-0">
      <div class="flex items-center justify-between px-3 py-[7px] bdr-b shrink-0">
        <span id="fileLabel" class="text-[11.5px] text-muted font-mono">main.rs</span>
        <div class="flex gap-[7px]">
          <button type="button" id="runBtn" class="btn text-[12px] px-3 py-1 flex items-center gap-1">
            <i class="ti ti-player-play text-[13px]" aria-hidden="true"></i>
            <span id="runLabel">Run</span>
          </button>
          <button type="button" id="evalBtn" class="btn text-[12px] px-3 py-1" title="Send your code + last run output to the tutor for review" disabled>Send to tutor →</button>
        </div>
      </div>
      <div id="codeArea" class="flex-1 overflow-hidden bg-raised bdr-b min-h-0"></div>
      <div id="resizeBar" class="resize-bar"></div>
      <div class="px-3 py-[5px] bdr-b text-[10px] font-medium uppercase tracking-[0.07em] text-muted shrink-0">Output</div>
      <pre id="outputPre"
        class="overflow-y-auto m-0 px-3 py-[9px] font-mono text-[12.5px] leading-relaxed whitespace-pre-wrap break-words text-primary"
        style="flex: 0 0 120px"><span class="text-muted">Run your code to see output here</span></pre>
    </div>

  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
